# Устанавливаем nginx
- name: Install nginx 
  ansible.builtin.apt:
    name: nginx
    state: latest
    update_cache: yes

# Копируем файл конфигурации сайта на сервер с заменой имени и содержимого
# Список сайтов берем из файла
- name: Copy nginx config from template
  loop: "{{ lookup('file', './target.txt').splitlines() }}"
  ansible.builtin.template:
    src: 'site.conf.j2'
    dest: '/etc/nginx/sites-available/site-{{ item }}.conf'
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

# Создаем папки для хранения Index файлов сайтов
- name: Create site directory
  loop: "{{ lookup('file', './target.txt').splitlines() }}"
  ansible.builtin.file:
    path: '/var/www/{{ item }}'
    state: directory

# Копируем файлы Index в созданные директории
- name: Copy Index from template
  loop: "{{ lookup('file', './target.txt').splitlines() }}"
  ansible.builtin.template:
    src: 'index.html.j2'
    dest: '/var/www/{{ item }}/index.html'
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx